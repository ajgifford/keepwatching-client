<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KeepWatching — Offline</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background-color: #121212;
        color: #ffffff;
        font-family: 'Roboto', 'Helvetica', 'Arial', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }
      .container {
        text-align: center;
        max-width: 400px;
      }
      .logo {
        width: 128px;
        height: 128px;
        margin: 0 auto 24px;
        opacity: 0.85;
      }
      h1 {
        font-size: 1.75rem;
        font-weight: 500;
        margin-bottom: 12px;
        color: #ffffff;
      }
      p {
        font-size: 1rem;
        color: rgba(255, 255, 255, 0.7);
        line-height: 1.6;
        margin-bottom: 32px;
      }
      button {
        background-color: #1976d2;
        color: #ffffff;
        border: none;
        border-radius: 4px;
        padding: 10px 28px;
        font-size: 0.9375rem;
        font-weight: 500;
        letter-spacing: 0.02857em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      button:hover {
        background-color: #1565c0;
      }
      button:active {
        background-color: #0d47a1;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img class="logo" src="./retrotv256.png" alt="KeepWatching logo" />
      <h1>You're offline</h1>
      <p>Check your internet connection and try again. Your watch history is safe and will sync when you're back online.</p>
      <button onclick="window.location.reload()">Retry</button>
    </div>
  </body>
</html>
