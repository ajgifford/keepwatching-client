name: Deploy to Raspberry Pi

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Run deployment after validation?'
        required: true
        type: boolean
        default: false

jobs:
  validate:
    name: Validate Build
    runs-on: ubuntu-latest
    env:
      GIT_NPM_TOKEN: ${{ secrets.GIT_NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn test

      - name: Build
        run: yarn build

  # Required secrets:
  #   PI_HOST      - IP or hostname of your Raspberry Pi
  #   PI_USER      - SSH username (e.g. "andy")
  #   PI_SSH_KEY   - Private key whose public counterpart is in ~/.ssh/authorized_keys on the Pi
  #   PI_APP_PATH  - Absolute path to the app on the Pi (e.g. /home/andy/keepwatching-server)
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ inputs.deploy == true }}

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Test SSH connection
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          script: |
            echo "SSH connection successful"
            echo "Checking app path..."
            cd ${{ secrets.PI_APP_PATH }}
            echo "App path is valid: $(pwd)"

      - name: Deploy to Pi
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          script: |
            cd ${{ secrets.PI_APP_PATH }}
            bash scripts/deploy.sh
